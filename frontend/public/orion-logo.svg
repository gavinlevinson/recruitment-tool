<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 510 575">

  <!-- White background so it looks correct on all surfaces -->
  <rect width="510" height="575" fill="white"/>

  <!-- ══════════════════════════════════════════
       ORION ARCHER SILHOUETTE  (#0d1b2e)
       ══════════════════════════════════════════ -->

  <!-- ── HEAD: clear right-facing profile ── -->
  <path fill="#0d1b2e" d="
    M 256 66
    C 266 58 282 54 298 54
    C 316 54 332 62 344 76
    C 350 84 354 94 354 104
    C 356 104 360 106 362 110
    C 363 116 356 120 350 123
    C 348 130 348 137 352 144
    C 348 154 336 162 322 165
    C 306 170 286 169 270 161
    C 255 153 246 140 244 125
    C 241 108 246 91 256 78
    C 256 74 255 70 256 66 Z
  "/>

  <!-- ── NECK (connects head to body) ── -->
  <path fill="#0d1b2e" d="M 258 154 Q 282 150 312 154 L 315 182 Q 280 180 254 182 Z"/>

  <!-- ── MAIN TORSO — broad muscular back ── -->
  <path fill="#0d1b2e" d="
    M 158 182
    L 345 176
    C 366 176 384 190 386 212
    C 388 234 378 254 368 270
    C 360 282 355 296 356 312
    C 357 328 363 342 360 358
    C 357 374 345 388 328 402
    C 312 416 290 426 268 430
    C 246 434 222 430 205 418
    C 188 406 178 386 175 365
    C 172 345 177 326 174 308
    C 171 289 162 270 156 251
    C 151 232 150 210 155 194
    C 156 190 157 186 158 182 Z
  "/>

  <!-- ── PULLING ARM (archer's right arm: bent up, pulling string to chin) ── -->
  <path fill="#0d1b2e" d="
    M 158 182
    C 146 166 133 148 126 130
    C 117 108 122 86 138 70
    C 152 56 172 50 190 52
    C 204 54 214 64 213 78
    C 200 86 190 100 188 116
    C 186 130 192 144 200 154
    C 190 164 176 174 158 182 Z
  "/>

  <!-- ── BOW ARM (archer's left arm: straight out to the right, holds bow grip) ── -->
  <path fill="#0d1b2e" d="
    M 382 202
    C 404 195 428 193 452 195
    C 464 196 474 202 474 209
    C 473 216 462 220 450 219
    C 427 218 405 212 385 208
    Z
  "/>

  <!-- ── BOW (recurve D-curve) ── -->
  <path fill="none" stroke="#0d1b2e" stroke-width="12" stroke-linecap="round"
    d="M 470 56
       C 510 96 520 152 517 202
       C 514 250 500 292 483 320
       C 474 336 464 350 456 356"/>

  <!-- Bow string -->
  <line x1="470" y1="56" x2="456" y2="356"
    stroke="#0d1b2e" stroke-width="2.5"/>

  <!-- ── ARROW ── -->
  <line x1="208" y1="206" x2="470" y2="206"
    stroke="#0d1b2e" stroke-width="3" stroke-linecap="round"/>
  <!-- Slim elongated arrowhead -->
  <polygon points="470,200 492,206 470,212" fill="#0d1b2e"/>

  <!-- ══════════════════════════════════════════
       ORION CONSTELLATION on back (white)
       ══════════════════════════════════════════ -->
  <g fill="white" stroke="white" stroke-width="2.5" stroke-linecap="round">
    <!-- Betelgeuse (upper-left shoulder) -->
    <circle cx="204" cy="208" r="6"/>
    <!-- Bellatrix (upper-right shoulder) -->
    <circle cx="248" cy="200" r="6"/>
    <!-- Belt: Alnitak / Alnilam / Mintaka -->
    <circle cx="200" cy="244" r="6"/>
    <circle cx="216" cy="237" r="6"/>
    <circle cx="232" cy="230" r="6"/>
    <!-- Saiph (lower-left foot) -->
    <circle cx="196" cy="278" r="6"/>
    <!-- Rigel (lower-right foot) -->
    <circle cx="234" cy="268" r="6"/>
    <!-- Lines: shoulders to belt -->
    <line x1="204" y1="208" x2="200" y2="244"/>
    <line x1="248" y1="200" x2="232" y2="230"/>
    <!-- Belt stars -->
    <line x1="200" y1="244" x2="216" y2="237"/>
    <line x1="216" y1="237" x2="232" y2="230"/>
    <!-- Belt to feet -->
    <line x1="200" y1="244" x2="196" y2="278"/>
    <line x1="232" y1="230" x2="234" y2="268"/>
  </g>

  <!-- ══════════════════════════════════════════
       ORION WORDMARK
       ══════════════════════════════════════════ -->
  <text
    x="255" y="530"
    text-anchor="middle"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="92"
    font-weight="900"
    fill="#0d1b2e"
    letter-spacing="6"
  >ORION</text>

</svg>
