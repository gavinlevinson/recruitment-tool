  <line x1="170" y1="18" x2="174" y2="162" stroke="#0c1a2e" stroke-width="2.5"/>
  <!-- Arrow shaft -->
  <line x1="15" y1="86" x2="162" y2="80" stroke="#0c1a2e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="162,76 178,80 162,84" fill="#0c1a2e"/>
  <!-- Constellation: shoulder stars -->
  <circle cx="76" cy="78" r="3.5" fill="white"/>
  <circle cx="96" cy="76" r="3.5" fill="white"/>
  <!-- Belt stars -->
  <circle cx="80" cy="97" r="3.5" fill="white"/>
  <circle cx="87" cy="94" r="3.5" fill="white"/>
  <circle cx="94" cy="97" r="3.5" fill="white"/>
  <!-- Lower stars -->
  <circle cx="78" cy="114" r="3.5" fill="white"/>
  <circle cx="96" cy="112" r="3.5" fill="white"/>
  <!-- Constellation lines -->
  <line x1="76" y1="78"  x2="80" y2="97"  stroke="white" stroke-width="1.8"/>
  <line x1="96" y1="76"  x2="94" y2="97"  stroke="white" stroke-width="1.8"/>
  <line x1="80" y1="97"  x2="87" y2="94"  stroke="white" stroke-width="1.8"/>
  <line x1="87" y1="94"  x2="94" y2="97"  stroke="white" stroke-width="1.8"/>
  <line x1="80" y1="97"  x2="78" y2="114" stroke="white" stroke-width="1.8"/>
  <line x1="94" y1="97"  x2="96" y2="112" stroke="white" stroke-width="1.8"/>
  <!-- ORION wordmark -->
  <text x="110" y="228" text-anchor="middle" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="38" font-weight="900" fill="#0c1a2e" letter-spacing="5">ORION</text>
