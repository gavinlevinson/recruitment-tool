<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 240" fill="none">
  <!-- Head -->
  <ellipse cx="163" cy="34" rx="21" ry="26" fill="#0c1a2e"/>
  <!-- Neck -->
  <rect x="148" y="53" width="22" height="14" rx="4" fill="#0c1a2e"/>
  <!-- Body / torso -->
  <path d="M 45 72 C 52 60 68 52 88 48 C 108 44 130 46 150 54 C 162 58 170 68 170 82 C 170 92 166 100 160 108 C 152 116 142 120 135 126 C 129 134 126 146 124 158 C 120 168 112 172 102 170 C 92 172 80 166 70 158 C 60 148 54 134 50 118 C 47 104 46 88 45 72 Z" fill="#0c1a2e"/>
  <!-- Left arm -->
  <path d="M 45 78 C 36 75 24 73 15 78 C 9 81 9 89 16 92 C 25 95 37 91 47 86 Z" fill="#0c1a2e"/>
  <!-- Bow -->
  <path d="M 170 18 C 200 38 212 70 210 100 C 207 128 194 148 174 162" stroke="#0c1a2e" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
